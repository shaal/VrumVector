    <script>
      // Drive `--fill` on every <input type="range"> so slider.css can paint
      // the filled portion of the track with a CSS gradient. The sliders are
      // rebuilt each phase (utils.js → phaseToLayout) so we both (a) run a
      // sweep after every mutation under #fullDisplay and (b) listen to input
      // events via delegation. No-op if the range has no min/max (shouldn't
      // happen — every slider in utils.js sets both).
      (() => {
        const setFill = (el) => {
          if (!(el instanceof HTMLInputElement) || el.type !== 'range') return;
          const min = Number(el.min || 0);
          const max = Number(el.max || 100);
          const val = Number(el.value);
          if (!Number.isFinite(min) || !Number.isFinite(max) || max === min) return;
          const pct = Math.max(0, Math.min(100, ((val - min) / (max - min)) * 100));
          el.style.setProperty('--fill', pct.toFixed(2) + '%');
        };
        const sweep = (root) => {
          (root || document).querySelectorAll('input[type="range"]').forEach(setFill);
        };
        document.addEventListener('input', (e) => setFill(e.target), true);
        document.addEventListener('change', (e) => setFill(e.target), true);
        // Initial pass once the DOM settles. phaseToLayout swaps innerHTML so
        // the MutationObserver below catches every new slider for free.
        const init = () => {
          sweep(document);
          const host = document.getElementById('fullDisplay') || document.body;
          const mo = new MutationObserver((muts) => {
            for (const m of muts) {
              for (const n of m.addedNodes) {
                if (n.nodeType === 1) sweep(n);
              }
            }
          });
          mo.observe(host, { childList: true, subtree: true });
        };
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', init, { once: true });
        } else {
          init();
        }
      })();
    </script>
    <script>
      // Right-panel collapse toggle. Mirrors aria-expanded ↔ a class on
      // #fullDisplay (CSS reads the class; screen readers read the attr)
      // and persists the preference. Restored on load so collapse survives
      // page refresh. The `P` key toggles it too as long as focus isn't in
      // a text input or contenteditable — quick keyboard access for power
      // users without stealing keystrokes from the track-name field etc.
      (() => {
        const KEY = 'vv.panelCollapsed';
        const display = document.getElementById('fullDisplay');
        const toggle = document.getElementById('panelToggle');
        if (!display || !toggle) return;
        const apply = (collapsed) => {
          display.classList.toggle('panel-collapsed', collapsed);
          toggle.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
          toggle.setAttribute('aria-label', collapsed ? 'Expand control panel' : 'Collapse control panel');
        };
        // Restore — default to expanded. localStorage read is wrapped because
        // Safari private mode throws synchronously on access.
        let saved = false;
        try { saved = localStorage.getItem(KEY) === '1'; } catch (_) {}
        apply(saved);
        toggle.addEventListener('click', () => {
          const nowCollapsed = !display.classList.contains('panel-collapsed');
          apply(nowCollapsed);
          try { localStorage.setItem(KEY, nowCollapsed ? '1' : '0'); } catch (_) {}
        });
        document.addEventListener('keydown', (e) => {
          if (e.key !== 'p' && e.key !== 'P') return;
          if (e.ctrlKey || e.metaKey || e.altKey) return;
          const t = e.target;
          if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
          toggle.click();
        });
      })();
    </script>

    <script>
      // Preflight + sidecar loader for the ruvector bridge.
      //
      // ruvectorBridge.js and its siblings statically import `../vendor/...`
      // — that path resolves above the server root when the dev server is
      // launched from inside AI-Car-Racer/ (a common mistake), which 404s
      // the wasm artifacts and cascades into a silent "bridge not ready"
      // state across every vector-memory UI panel. Catching static-import
      // failures from the outside isn't possible, so we probe the vendor
      // tree with a HEAD request *before* loading any module — if the
      // probe fails we show a DOM banner explaining the launcher mistake
      // and don't load the module at all. If the probe succeeds we inject
      // the sidecar module dynamically with the same body as before.
      (async () => {
        // Must match the `?v=...` suffix in ruvectorBridge.js to probe
        // the same edge-cache key the real import will fetch.
        const VENDOR_PROBE = '../vendor/ruvector/ruvector_wasm/ruvector_wasm.js?v=hnsw-wasm-20260424b';
        const probeUrl = new URL(VENDOR_PROBE, document.baseURI).href;
        let reachable = false;
        try {
          const resp = await fetch(probeUrl, { method: 'HEAD' });
          reachable = resp.ok;
        } catch (_) { reachable = false; }

        if (!reachable) {
          const b = document.createElement('div');
          b.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#8b1a1a;color:#fff;padding:14px 20px;z-index:99999;font:13px/1.45 system-ui,-apple-system,sans-serif;box-shadow:0 2px 10px rgba(0,0,0,.4);';
          b.innerHTML =
            '<strong>ruvector bridge disabled</strong> — vendored wasm tree not reachable from this origin.<br>' +
            'Probe returned 404 for <code style="background:#2a0f0f;padding:1px 4px;border-radius:2px">' + probeUrl + '</code><br><br>' +
            'Most common cause: the static server was launched from <code>AI-Car-Racer/</code>. Launch from the repo root instead:' +
            '<pre style="background:#2a0f0f;padding:8px;margin:6px 0;border-radius:3px;overflow:auto;white-space:pre-wrap;">./scripts/serve.sh\n# or manually:\n# cd &lt;repo-root&gt; &amp;&amp; python3 -m http.server 8765\n# then open http://localhost:8765/AI-Car-Racer/index.html</pre>' +
            '<small>Training + physics still work without the bridge; vector-memory panels (archive, lineage, reranker) will stay empty.</small>';
          document.body.appendChild(b);
          console.error('[ruvector] preflight failed — vendor tree unreachable at', probeUrl);
          return;
        }

        const s = document.createElement('script');
        s.type = 'module';
        // Sidecar module: warms the ruvector bridge and exposes handles on
        // window.__rvBridge / window.__rvUnflatten / window.__rvDynamics for
        // classic-script consumers (main.js uses unflatten to turn seed
        // Float32 vectors into NeuralNetwork instances; the bridge itself has
        // no globalThis access to NeuralNetwork).
        s.textContent = [
          "import * as bridge from './ruvectorBridge.js';",
          "import * as dynamics from './dynamicsEmbedder.js';",
          "import { unflatten } from './brainCodec.js';",
          "window.__rvBridge = bridge;",
          "window.__rvDynamics = dynamics;",
          "window.__rvUnflatten = unflatten;",
          "bridge.ready().catch((e) => {",
          "  console.error('[ruvector] init failed after preflight:', e);",
          "  const b = document.createElement('div');",
          "  b.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#8b4a1a;color:#fff;padding:12px 20px;z-index:99999;font:13px/1.45 system-ui,-apple-system,sans-serif';",
          "  b.innerHTML = '<strong>ruvector init failed after preflight:</strong> ' + ((e && e.message) || String(e)) + ' — see console for details';",
          "  document.body.appendChild(b);",
          "});",
        ].join('\n');
        document.body.appendChild(s);
      })();
    </script>
